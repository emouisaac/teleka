<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teleka Taxi - Ride Chat</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="dashboard-container">
    <section class="content">
      <div class="section active">
        <h1>Ride Chat</h1>
        <p id="chatSummary">Loading ride conversation...</p>
        <form id="resetRequestForm" class="profile-form hidden">
          <label>Registered WhatsApp Number</label>
          <input id="resetWhatsappNumber" type="tel" placeholder="+256..." required />
          <div class="actions-row">
            <button type="submit" class="btn">Submit Reset Request</button>
            <a id="resetBackLink" href="driver.html" class="btn">Back</a>
          </div>
        </form>
        <div class="map-card">
          <div id="chatMessages" class="notifications-list">
            <div class="notification-empty">
              <p>No messages yet.</p>
            </div>
          </div>
          <form id="chatForm" class="profile-form">
            <label>Message</label>
            <textarea id="chatInput" rows="4" placeholder="Type your message..." required></textarea>
            <div class="actions-row">
              <button type="submit" class="btn">Send Message</button>
              <a id="chatBackLink" href="index.html" class="btn">Back</a>
            </div>
          </form>
        </div>
      </div>
    </section>
  </main>
  <script src="chat.js"></script>
</body>
</html>
